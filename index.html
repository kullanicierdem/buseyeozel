<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Mesajım Var ✨</title>
    <style>
        body {
    background: #1a1a2e; /* Koyu lacivert/gece mavisi */
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
}

.btn-random {
    background: #4ecca3; /* Tatlı bir nane yeşili/turkuaz */
    color: #1a1a2e;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(78, 204, 163, 0.3);
}

.btn-random:hover {
    background: #45b393;
    transform: translateY(-2px); /* Buton hafif yukarı zıplar */
}

.heart {
    color: #4ecca3; /* Kalbi de aynı renge çekelim veya bir yıldız '⭐' ile değiştirebilirsin */
}
    </style>
</head>
<body>

    <div class="heart">❤️</div>
    <h1>İyi ki Varsın</h1>
    
    <div class="message-box">
        <p id="quote">"Seninle her şey daha anlamlı..."</p>
    </div>

    <button class="btn-random" onclick="getRandomSong()">🎵 Bana Bir Şarkı Öner</button>

    <div id="music-container">
        <p style="opacity: 0.6;">Butona basınca senin için bir şarkı seçeceğim...</p>
    </div>

    <script>
    const songs = [
        "https://open.spotify.com/embed/track/2Z76fWk47GvA8VAn1fA8Wj", // Nilshe - Anka
        "https://open.spotify.com/embed/track/1P0U5L0sN5Z5XQ5N7aK7l6", // Mert Demir - Olmazlara Vuruluyorum
        "https://open.spotify.com/embed/track/0X8qO8mX3F6vD7M7I8v7X7", // Rıza Tamer - Benden Sonra
        "https://open.spotify.com/embed/track/5uCps733mclYofvN2W4J67", // Örnek: Benzer Tarz 1
        "https://open.spotify.com/embed/track/4uLU6YMCBNI0iUv969vUTM"  // Örnek: Benzer Tarz 2
    ];

    const messages = [
    "Senin şu bitmek bilmeyen pozitif enerjin için bir şarkı... ✨",
    "Gülüşün gibi aşırı tatlı bir melodi bıraktım buraya. 🌸",
    "Bu şarkı tam olarak senin o kendine has 'vibe'ını yansıtıyor! 💫",
    "Dünyanın en şirin insanına küçük bir müzik molası. 🎀",
    "Seninle dertleşmek her zaman en sevdiğim aktivite, bu da fon müziği olsun. ☕",
    "Senin o doğal şıklığın ve zarafetin bu şarkıda gizli gibi... ✨",
    "Modun düşükse bu şarkı seni senin kadar parlatmaya gelsin! 🌟",
    "Hayatımdaki en renkli karakterlerden birisin, iyi ki varsın! 🎨"
];

    function getRandomSong() {
        const container = document.getElementById('music-container');
        const quoteElement = document.getElementById('quote');
        
        // Rastgele şarkı seç
        const randomSongIndex = Math.floor(Math.random() * songs.length);
        const selectedSong = songs[randomSongIndex];
        
        // Rastgele söz seç
        const randomMessageIndex = Math.floor(Math.random() * messages.length);
        const selectedMessage = messages[randomMessageIndex];
        
        // Sözü güncelle (küçük bir görsel efektle)
        quoteElement.style.opacity = 0;
        setTimeout(() => {
            quoteElement.innerText = selectedMessage;
            quoteElement.style.opacity = 1;
        }, 300);

        // Şarkıyı güncelle
        container.innerHTML = `
            <iframe style="border-radius:12px; transition: all 0.5s ease;" 
                src="${selectedSong}" 
                width="100%" height="152" 
                frameBorder="0" allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        `;
    }
</script>
</body>
</html>
